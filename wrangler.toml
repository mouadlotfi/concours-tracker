name = "concours-tracker"
compatibility_date = "2026-07-06"
compatibility_flags = [ "nodejs_compat" ]

# Run locally or via CF Workers
main = "src/index.tsx"

[dev]
local_protocol = "http"

[[d1_databases]]
binding = "DB"
database_name = "concours-db"
database_id = "54db175f-a5ba-40e1-80f3-010e1e42a1d8"
migrations_dir = "migrations"

[triggers]
# Run every 5 hours
crons = ["0 */5 * * *"]

[assets]
directory = "./public"

[vars]
# You can set vars here, secrets should be set via `wrangler secret put`
# For local dev, put secrets in .dev.vars
OPENROUTER_MODEL = "openrouter/free"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
invocation_logs = true
persist = true

[observability.traces]
enabled = true
head_sampling_rate = 0.05
